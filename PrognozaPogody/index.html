<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prognoza Pogody</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet" />
</head>

<Script>
    const apiKey = "";//TWÓJ_KLUCZ_API
    let city = "Łódź";
    let liczbaDiv = 0;
</Script>


<body class="dzien">
    <img src="obrazy/sky.jpg" class="obraz" width="100%" height="100%">
    <div class="box">

        <header>
            <h1>Prognoza pogody</h1>

            <div class="form">
                <input type="text"  placeholder="Podaj miasto" id="noweMiasto">
                <input type="button" value="Szukaj" id="guzik" class="guzik">
            </div>

            <input type="button" value="Zmień tryb" id="trybNoc" class="guzik">
        </header>

        <main id="main">
            
            <div class="div0">
                <p class="info"></p>
                
                <div class="imgTlo">
                    <img src="" class="ikona">
                </div>
                
                <p class="temp"></p>

                <div class="pogodanNa12h">

                </div>
                
                <hr>

                <p>Pogoda na najbliższe 4 dni:</p>
                <table class="tab">
                </table>
            </div>
            
        </main>

    </div>

</body>


<script>

    function pobierzPogode(){
        document.querySelector(`.div${liczbaDiv} .info`).innerText = "Pogoda w " + city;
        
        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=pl`)
        .then(response => response.json())
        .then(data => {

            if (data.cod === "404") {
                
                let div = document.querySelector(`.div${liczbaDiv}`);
                div.innerHTML = `<p>Źle napisałeś</p> <hr class="linia">`;

                return;
            }

            console.log(data);
            document.querySelector(`.div${liczbaDiv} .temp`).innerText = "Aktualna temperatuta to " + data.main.temp + "°C";
            document.querySelector(`.div${liczbaDiv} .ikona`).src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
        });
    

        //Pobranie Pogody na 4 następne dni

        let tab = document.querySelector(`.div${liczbaDiv} .tab`);
        let text = "";

        fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric&lang=pl`)
        .then(res => res.json())
            .then(data => {

            const daily = data.list.filter(item =>
                item.dt_txt.includes("12:00:00")
            );

            //pierwszy wiersz
            text +=  `<tr>`;
                
            for(let i = 1; i < 5; i++){
            
                let date = new Date(daily[i].dt_txt);

                let plData = date.toLocaleDateString('pl-PL');

                text += `<th> ${plData} </th>`;

            }

            text +=  `</tr>`;

            //drugi wiersz
            text +=  `<tr>`;
                
            for(let i = 1; i < 5; i++){
            text += 
            `<th> ${daily[i].main.temp}°C </th>`;
            }

            text +=  `</tr>`;

            //trzeci wiersz
            text +=  `<tr>`;
                
            for(let i = 1; i < 5; i++){
            text += 
            `<th> ${daily[i].weather[0].description} </th>`;
            }

            text +=  `</tr>`;
            
            tab.innerHTML = text;     
        });

    }

    function noweMiasto(){
        
        let main = document.getElementById("main");

        let dane = main;


        let div = document.createElement("div");
        liczbaDiv++;
        div.classList.add("div" + liczbaDiv);

        if(city === ""){
            
            div.innerHTML = `<p>Nie podałeś miasta</p> <hr class="linia">`;
            main.insertBefore(div, main.firstChild);

        }else{

            div.innerHTML = 
                `
                <p class="info"></p>
                
                <div class="imgTlo">
                    <img src="" class="ikona">
                </div>
                
                <p class="temp"></p>
                
                <hr>

                <p>Pogoda na najbliższe 4 dni:</p>
                <table class="tab">
                </table>
                <hr class="linia">
            `;
            
            
            main.insertBefore(div, main.firstChild);

            pobierzPogode();

        }
    }

    pobierzPogode();

    let przycisk = document.getElementById("guzik");

    przycisk.addEventListener("click", function() {
        city = document.getElementById("noweMiasto").value;

        noweMiasto();
    });

    let zmianaTrybu = document.getElementById("trybNoc");

    zmianaTrybu.addEventListener("click", function() {

        let body = document.querySelector("body");

        if(!body.classList.contains('noc')){
            body.classList.add('noc');
            document.querySelector(".obraz").src="obrazy/night.jpg";
        }else{
            body.classList.remove("noc");
            document.querySelector(".obraz").src="obrazy/sky.jpg";
        }

    });

</script>
</html>
